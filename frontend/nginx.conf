server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
